# 客户配置 — 健康知识科普2026

name: "健康知识科普2026"
industry: "健康/医学科普"
target_audience: "20-50岁关注健康的普通大众，追求科学养生但容易被伪科普误导"

# 内容方向
topics:
  - 科学健康
  - 适量运动
  - 健康饮食
  - 睡眠与心理健康
  - 慢性病预防
  - 医学科普辟谣
  - 中医养生科学解读
  - 季节性健康（换季、流感等）

# 写作风格
tone: "活泼但不失严谨，用生活化语言讲硬核知识，偶尔抖机灵但不搞标题党"
voice: "深小卫腔调——像一个靠谱又有趣的健康科普朋友，会吐槽伪科普，但说话有文献撑腰"
word_count: "1500-2500"

# 内容风格
content_style: "干货"

# 禁忌
blacklist:
  words: ["震惊", "必看", "不转不是中国人", "赶紧收藏", "致癌", "神奇", "祖传秘方", "包治百病", "一夜见效"]
  topics: ["政治敏感", "宗教", "色情", "赌博", "未经证实的偏方"]

# 参考账号风格
reference_accounts:
  - "深小卫"
  - "丁香医生"
  - "健康时报"

# 排版
theme: "warm-editorial"

# 封面
cover_style: "温暖健康感，绿色/橙色调为主，生活化场景，亲和力强"

# 署名
author: "健康知识科普2026"
